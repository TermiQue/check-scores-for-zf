<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="370" viewBox="0 0 1200 370" role="img" aria-labelledby="title desc">
  <title id="title">成绩检查与微信推送规则</title>
  <desc id="desc">首次查询推送全部成绩，无变化保持静默，有变化推送带新增更新标记的完整成绩单</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#17211c" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 28px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #203029; }
      .head { font: 700 20px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #203029; }
      .body { font: 15px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #526159; }
      .tag { font: 700 14px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #ffffff; }
    </style>
  </defs>
  <rect width="1200" height="370" rx="24" fill="#f7f9f5"/>
  <text x="60" y="58" class="title">什么时候会推送微信？</text>
  <text x="60" y="88" class="body">每次检查都会更新运行状态，但只有下面两类结果会发送成绩消息。</text>

  <g filter="url(#shadow)">
    <rect x="60" y="125" width="330" height="185" rx="20" fill="#ffffff" stroke="#2bae85" stroke-width="3"/>
    <rect x="435" y="125" width="330" height="185" rx="20" fill="#ffffff" stroke="#b9c3bc" stroke-width="3"/>
    <rect x="810" y="125" width="330" height="185" rx="20" fill="#ffffff" stroke="#AB372F" stroke-width="3"/>
  </g>

  <rect x="85" y="150" width="86" height="28" rx="14" fill="#2bae85"/>
  <text x="105" y="170" class="tag">第一次</text>
  <text x="85" y="216" class="head">推送全部成绩</text>
  <text x="85" y="248" class="body">建立本地成绩基线</text>
  <text x="85" y="274" class="body">按提交时间从新到旧排列</text>

  <rect x="460" y="150" width="86" height="28" rx="14" fill="#87958b"/>
  <text x="480" y="170" class="tag">无变化</text>
  <text x="460" y="216" class="head">保持静默</text>
  <text x="460" y="248" class="body">不重复发送相同成绩</text>
  <text x="460" y="274" class="body">继续心跳并等待下一次检查</text>

  <rect x="835" y="150" width="86" height="28" rx="14" fill="#AB372F"/>
  <text x="855" y="170" class="tag">有变化</text>
  <text x="835" y="216" class="head">推送完整成绩单</text>
  <text x="835" y="248" class="body">新课程标记“新增”</text>
  <text x="835" y="274" class="body">已有课程变化标记“更新”</text>

  <text x="60" y="344" class="body">推送成功后才保存新基线；推送失败时，下次检查会继续重试。</text>
</svg>
