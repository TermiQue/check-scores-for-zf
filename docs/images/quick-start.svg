<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">正方成绩检查服务快速开始</title>
  <desc id="desc">依次安装 Docker、准备 ShowDoc、启动项目、完成验证并收到微信推送</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#17211c" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#87958b"/>
    </marker>
    <style>
      .title { font: 700 28px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #203029; }
      .step { font: 700 18px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #203029; }
      .body { font: 14px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #526159; }
      .number { font: 700 20px "Segoe UI", sans-serif; fill: #ffffff; }
    </style>
  </defs>
  <rect width="1200" height="360" rx="24" fill="#f0f5e5"/>
  <text x="60" y="58" class="title">五步完成自动成绩检查</text>
  <text x="60" y="88" class="body">只有确实需要校园内网时才启动隔离 VPN，完成验证后服务在 Docker 后台运行。</text>

  <g filter="url(#shadow)">
    <rect x="55" y="130" width="190" height="160" rx="18" fill="#ffffff"/>
    <rect x="280" y="130" width="190" height="160" rx="18" fill="#ffffff"/>
    <rect x="505" y="130" width="190" height="160" rx="18" fill="#ffffff"/>
    <rect x="730" y="130" width="190" height="160" rx="18" fill="#ffffff"/>
    <rect x="955" y="130" width="190" height="160" rx="18" fill="#ffffff"/>
  </g>

  <g>
    <circle cx="90" cy="165" r="21" fill="#AB372F"/><text x="84" y="172" class="number">1</text>
    <text x="75" y="213" class="step">安装 Docker</text>
    <text x="75" y="242" class="body">启用 Linux Containers</text>
    <text x="75" y="264" class="body">并启动 Docker Desktop</text>

    <circle cx="315" cy="165" r="21" fill="#AB372F"/><text x="309" y="172" class="number">2</text>
    <text x="300" y="213" class="step">准备微信推送</text>
    <text x="300" y="242" class="body">登录 ShowDoc Push</text>
    <text x="300" y="264" class="body">复制专属推送地址</text>

    <circle cx="540" cy="165" r="21" fill="#AB372F"/><text x="534" y="172" class="number">3</text>
    <text x="525" y="213" class="step">打开启动器</text>
    <text x="525" y="242" class="body">双击 windows-launcher.cmd</text>
    <text x="525" y="264" class="body">首次输入账号和 Token</text>

    <circle cx="765" cy="165" r="21" fill="#fbb929"/><text x="759" y="172" class="number">4</text>
    <text x="750" y="213" class="step">完成必要验证</text>
    <text x="750" y="242" class="body">短信验证与图片验证码</text>
    <text x="750" y="264" class="body">只在需要时出现</text>

    <circle cx="990" cy="165" r="21" fill="#2bae85"/><text x="984" y="172" class="number">5</text>
    <text x="975" y="213" class="step">收到成绩推送</text>
    <text x="975" y="242" class="body">首次推送全部成绩</text>
    <text x="975" y="264" class="body">后续变化才通知</text>
  </g>

  <g stroke="#87958b" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M247 210 H273"/><path d="M472 210 H498"/><path d="M697 210 H723"/><path d="M922 210 H948"/>
  </g>
</svg>
