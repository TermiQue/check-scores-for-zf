name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --requirement requirements.lock

      - name: Run tests
        run: python -m unittest discover --start-directory tests --verbose

      - name: Compile Python sources
        run: >-
          python -m py_compile
          zfcheck/__main__.py
          zfcheck/config.py
          zfcheck/model.py
          zfcheck/notifier.py
          zfcheck/service.py
          zfcheck/state.py
          scripts/zfn_api.py
